apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-pipeline-sa
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-pipeline-reader
  namespace: default
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-pipeline-reader-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: devops-pipeline-sa
    namespace: default
roleRef:
  kind: Role
  name: devops-pipeline-reader
  apiGroup: rbac.authorization.k8s.io