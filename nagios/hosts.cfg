define host {
  use                     linux-server
  host_name               minikube
  alias                   Minikube Node
  address                 127.0.0.1
}

define service {
  use                     generic-service
  host_name               minikube
  service_description     Minikube Ping
  check_command           check_ping!100.0,20%!500.0,60%
}

define service {
  use                     generic-service
  host_name               minikube
  service_description     DevOps App Health
  check_command           check_http!-H $HOSTADDRESS$ -p 30080 -u /health
}
