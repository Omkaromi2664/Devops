define command {
  command_name            check_http_minikube
  command_line            /bin/sh -c '/usr/bin/curl -fsS --max-time 5 http://192.168.49.2:30080/health >/dev/null && echo "HTTP OK - /health on minikube"'
}

define host {
  use                     linux-server
  host_name               minikube
  alias                   Minikube Node
  address                 127.0.0.1
}

define service {
  use                     generic-service
  host_name               minikube
  service_description     DevOps App Health
  check_command           check_http_minikube
}